<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EduMerge CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-[#F8FAFC] min-h-screen flex items-center justify-center selection:bg-indigo-100">
    
    <div class="bg-white p-10 rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] w-full max-w-md border border-slate-100 relative overflow-hidden">
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-gradient-to-br from-indigo-500 to-purple-500 rounded-full blur-3xl opacity-20 pointer-events-none"></div>
        <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-gradient-to-tr from-blue-500 to-emerald-500 rounded-full blur-3xl opacity-20 pointer-events-none"></div>

        <div class="relative z-10">
            <div class="flex justify-center mb-6">
                <div class="bg-gradient-to-br from-indigo-500 to-purple-600 p-3 rounded-2xl shadow-lg shadow-indigo-500/30">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                </div>
            </div>

            <h2 class="text-2xl font-extrabold mb-1 text-center text-slate-900 tracking-tight">Welcome to EduMerge</h2>
            <p class="text-center text-slate-500 text-sm font-medium mb-8">Secure Access Portal</p>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="p-4 mb-6 text-sm font-bold rounded-xl flex items-center {% if category == 'error' %}bg-red-50 border border-red-200 text-red-700{% else %}bg-emerald-50 border border-emerald-200 text-emerald-700{% endif %}">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="/login" class="space-y-5">
                <div>
                    <label class="block text-sm font-extrabold text-slate-700 mb-1.5">Username</label>
                    <input type="text" name="username" class="w-full border border-slate-200 rounded-xl p-3.5 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all font-medium text-slate-800 bg-slate-50 focus:bg-white" placeholder="admin, officer, mgmt" required autofocus>
                </div>
                
                <div>
                    <label class="block text-sm font-extrabold text-slate-700 mb-1.5">Password</label>
                    <input type="password" name="password" class="w-full border border-slate-200 rounded-xl p-3.5 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all font-medium text-slate-800 bg-slate-50 focus:bg-white" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="w-full bg-slate-900 text-white font-extrabold py-3.5 px-4 rounded-xl hover:bg-indigo-600 transition-all shadow-lg hover:shadow-indigo-500/30 transform hover:-translate-y-0.5 mt-2">
                    Authenticate Session
                </button>
            </form>
            
            <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                <p class="font-bold text-xs uppercase tracking-wider text-slate-400 mb-3">Testing Credentials (PW: 123)</p>
                <div class="flex justify-center space-x-3 text-xs font-bold">
                    <span class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg border border-slate-200">admin</span>
                    <span class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg border border-slate-200">officer</span>
                    <span class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg border border-slate-200">mgmt</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
